<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Senova</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      background: #F0F4F8;
      color: #2C2C2A;
      min-width: 360px;
    }

    /* ── HEADER ── */
    header {
      background: #1A3A5C;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #C9A84C;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: #1A3A5C;
      flex-shrink: 0; letter-spacing: -1px;
    }
    header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    header p  { font-size: 11px; color: #90ADC6; margin-top: 1px; }
    .header-right { margin-left: auto; }
    .btn-app {
      font-size: 11px; color: #C9A84C; background: none; border: 1px solid #C9A84C44;
      border-radius: 5px; padding: 4px 9px; cursor: pointer; white-space: nowrap;
    }
    .btn-app:hover { background: #C9A84C22; }

    /* ── BODY ── */
    .body { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

    /* ── ESTADOS ── */
    #estado-loading, #estado-vaga, #estado-sinal, #estado-generico {
      display: none;
    }

    /* ── LOADING ── */
    .loading-wrap { text-align: center; padding: 24px 0; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #D0D9E4;
      border-top-color: #2E6DA4; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 13px; color: #5A6A7A; }

    /* ── VAGA ── */
    .vaga-header { background: #fff; border-radius: 8px; padding: 10px 12px; border: 1px solid #D0D9E4; }
    .vaga-cargo  { font-size: 14px; font-weight: 700; color: #1A3A5C; line-height: 1.3; }
    .vaga-meta   { font-size: 11.5px; color: #5A6A7A; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
    .vaga-canal  { background: #EEF4FA; color: #2E6DA4; padding: 2px 7px; border-radius: 4px; font-weight: 600; font-size: 11px; }

    /* ── SCORE ── */
    .score-wrap { background: #fff; border-radius: 8px; padding: 10px 12px; border: 1px solid #D0D9E4; }
    .score-top  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .score-label{ font-size: 11px; font-weight: 700; color: #5A6A7A; text-transform: uppercase; letter-spacing: .05em; }
    .score-num  { font-size: 20px; font-weight: 800; }
    .score-bar-bg { height: 5px; background: #E5ECF2; border-radius: 3px; overflow: hidden; }
    .score-bar  { height: 5px; border-radius: 3px; transition: width .6s ease; }
    .score-resumo { font-size: 12px; color: #3A4A5A; margin-top: 7px; line-height: 1.5; }

    .pontos { margin-top: 7px; display: flex; flex-direction: column; gap: 3px; }
    .ponto  { font-size: 12px; display: flex; gap: 6px; align-items: flex-start; line-height: 1.4; }
    .ponto-ok  { color: #1A7A4A; }
    .ponto-att { color: #B8670A; }

    /* ── CANDIDATURA ── */
    .candidatura-wrap {
      background: #fff; border-radius: 8px; padding: 10px 14px;
      border: 1px solid #D0D9E4; display: flex; align-items: center; gap: 8px;
    }
    .candidatura-ico { font-size: 16px; }
    .candidatura-txt { font-size: 12.5px; color: #2C2C2A; }
    .candidatura-tipo { font-weight: 700; color: #1A3A5C; }

    /* ── AÇÕES ── */
    .acoes { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-primary {
      background: #1A3A5C; color: #fff; border: none; border-radius: 7px;
      padding: 10px 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .15s; text-align: center;
    }
    .btn-primary:hover { background: #0F2A4A; }
    .btn-primary:disabled { background: #90ADC6; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: #2E6DA4; border: 1.5px solid #2E6DA4; border-radius: 7px;
      padding: 10px 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s; text-align: center;
    }
    .btn-secondary:hover { background: #EEF4FA; }

    /* ── SINAL ── */
    .sinal-wrap { background: #fff; border-radius: 8px; padding: 14px; border: 1px solid #D0D9E4; }
    .sinal-badge { font-size: 11px; font-weight: 700; color: #B8670A; background: #FFF8EC; border: 1px solid #C9A84C44; border-radius: 4px; padding: 3px 8px; display: inline-block; margin-bottom: 8px; }
    .sinal-titulo { font-size: 14px; font-weight: 700; color: #1A3A5C; line-height: 1.4; margin-bottom: 6px; }
    .sinal-resumo { font-size: 12.5px; color: #3A4A5A; line-height: 1.5; max-height: 80px; overflow: hidden; }

    /* ── GENÉRICO ── */
    .generico-wrap { text-align: center; padding: 20px 16px; }
    .generico-ico { font-size: 36px; margin-bottom: 10px; }
    .generico-txt { font-size: 13px; color: #5A6A7A; line-height: 1.6; }

    /* ── TOAST ── */
    #toast {
      display: none; position: fixed; bottom: 12px; left: 12px; right: 12px;
      background: #1A7A4A; color: #fff; font-size: 13px; font-weight: 600;
      padding: 10px 14px; border-radius: 8px; text-align: center; z-index: 99;
    }
    #toast.erro { background: #C0281E; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: #D0D9E4; margin: 2px 0; }
  </style>
</head>
<body>

<header>
  <div class="logo">S</div>
  <div>
    <h1>Senova</h1>
    <p>Radar executivo</p>
  </div>
  <div class="header-right">
    <button class="btn-app" id="btn-abrir-app">Abrir app ↗</button>
  </div>
</header>

<div class="body">

  <!-- LOADING -->
  <div id="estado-loading">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-txt" id="loading-txt">Analisando vaga...</div>
    </div>
  </div>

  <!-- VAGA -->
  <div id="estado-vaga">
    <div class="vaga-header">
      <div class="vaga-cargo" id="vaga-cargo">—</div>
      <div class="vaga-meta">
        <span id="vaga-empresa"></span>
        <span class="vaga-canal" id="vaga-canal"></span>
        <span id="vaga-local"></span>
      </div>
    </div>

    <div class="score-wrap" id="score-wrap" style="display:none">
      <div class="score-top">
        <span class="score-label">Match com seu perfil</span>
        <span class="score-num" id="score-num">—</span>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar" id="score-bar" style="width:0%"></div>
      </div>
      <div class="score-resumo" id="score-resumo"></div>
      <div class="pontos" id="pontos-lista"></div>
    </div>

    <div class="acoes">
      <button class="btn-primary" id="btn-salvar">Salvar</button>
      <button class="btn-secondary" id="btn-analisar">Analisar ↗</button>
    </div>
    <div id="acoes-pos-save" style="display:none;margin-top:4px;">
      <button id="btn-ver-processos" style="width:100%;padding:8px;background:none;border:1.5px solid #C9A84C;border-radius:7px;color:#C9A84C;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;">
        Ver nos Processos →
      </button>
    </div>
  </div>

  <!-- SINAL DE MERCADO -->
  <div id="estado-sinal">
    <div class="sinal-wrap">
      <div class="sinal-badge">📡 Sinal de mercado</div>
      <div class="sinal-titulo" id="sinal-titulo">—</div>
      <div class="sinal-resumo" id="sinal-resumo"></div>
    </div>
    <div class="acoes" style="margin-top:0">
      <button class="btn-primary" id="btn-salvar-sinal">Salvar Sinal</button>
      <button class="btn-secondary" id="btn-ignorar-sinal">Ignorar</button>
    </div>
  </div>

  <!-- GENÉRICO / DESCONHECIDO -->
  <div id="estado-generico">
    <div class="generico-wrap">
      <div class="generico-ico">🔍</div>
      <div class="generico-txt">
        Selecione o texto de uma vaga ou notícia<br>e clique no ícone Senova novamente.
      </div>
    </div>
  </div>

  <!-- HABILITAR EMAILS DESTE PORTAL -->
  <div id="habilitar-portal-wrap" style="display:none;">
    <div class="divider"></div>
    <button id="btn-habilitar-portal" style="width:100%;padding:9px 12px;background:#fff;border:1.5px solid #D0D9E4;border-radius:7px;font-size:12.5px;font-weight:600;color:#2E6DA4;cursor:pointer;font-family:inherit;text-align:left;">
      + Habilitar Senova a ler emails deste portal
    </button>
  </div>

</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
