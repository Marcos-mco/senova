<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senova — Capturar Vaga</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      background: #F0F4F8;
      color: #2C2C2A;
    }
    header {
      background: #1A3A5C;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo {
      width: 28px; height: 28px;
      background: #C9A84C;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #1A3A5C;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px; font-weight: 600; color: #fff;
      line-height: 1.2;
    }
    header p { font-size: 11px; color: #90ADC6; line-height: 1.2; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 11px; font-weight: 600; color: #5A6A7A; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 3px; }
    input, textarea {
      width: 100%; border: 1px solid #D0D9E4; border-radius: 6px;
      padding: 7px 9px; font-size: 13px; color: #2C2C2A;
      background: #fff; font-family: inherit;
      transition: border-color .15s;
      resize: none;
    }
    input:focus, textarea:focus { outline: none; border-color: #2E6DA4; }
    textarea { height: 60px; }
    #status-extract {
      font-size: 12px; color: #5A6A7A;
      background: #EEF4FA; border-radius: 6px;
      padding: 6px 10px; display: none;
    }
    #btn-salvar {
      background: #2E6DA4; color: #fff; border: none;
      border-radius: 7px; padding: 10px 0;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s; width: 100%;
    }
    #btn-salvar:hover:not(:disabled) { background: #1A3A5C; }
    #btn-salvar:disabled { background: #90ADC6; cursor: not-allowed; }
    #msg-ok {
      display: none; background: #D4EDDA; border: 1px solid #C3E6CB;
      border-radius: 7px; padding: 10px 12px;
      font-size: 13px; color: #155724; font-weight: 500; text-align: center;
    }
    #msg-erro {
      display: none; background: #F8D7DA; border: 1px solid #F5C6CB;
      border-radius: 7px; padding: 10px 12px;
      font-size: 12px; color: #721C24; text-align: center;
    }
    .footer {
      padding: 8px 16px 12px;
      font-size: 11px; color: #90ADC6; text-align: center;
    }
    .footer a { color: #2E6DA4; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">S</div>
    <div>
      <h1>Capturar Vaga</h1>
      <p>Salvar no Pipeline Senova</p>
    </div>
  </header>

  <div class="body">
    <div id="status-extract">⏳ Extraindo dados da página...</div>

    <div>
      <label>Cargo</label>
      <input id="campo-titulo" type="text" placeholder="Ex: Diretor de Marketing">
    </div>
    <div>
      <label>Empresa</label>
      <input id="campo-empresa" type="text" placeholder="Ex: Grupo Boticário">
    </div>
    <div>
      <label>URL da vaga</label>
      <input id="campo-url" type="text" placeholder="https://...">
    </div>

    <button id="btn-salvar" disabled>Salvar no Pipeline</button>
    <div id="msg-ok">✅ Vaga salva! Clique em "Importar vagas" no Pipeline.</div>
    <div id="msg-erro"></div>
  </div>

  <div class="footer">
    <a href="https://marcos-mco.github.io/senova" target="_blank">Abrir Senova</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
